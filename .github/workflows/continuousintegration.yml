name: Continuous Integration

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pylint
        uses: Silleellie/pylint-github-action@v2.1
        with:
          lint-path: .
          python-version: '3.10'
      - name: Instalar arquivos faltantes
        run: |
          python -m pip install --upgrade pip
          pip install pylint