name: Continuous Integration

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Rodar pylint
        run: pylint . || true